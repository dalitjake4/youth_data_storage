<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Carlos Youth Information System</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --danger: #e74c3c; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: var(--primary); text-align: center; margin-bottom: 5px; }
        
        /* Login Overlay */
        #loginOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(44, 62, 80, 0.98);
            display: flex; justify-content: center; align-items: center;
            z-index: 2000;
        }
        .login-box { background: white; padding: 40px; border-radius: 10px; width: 350px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-box button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 1rem; }
        .btn-guest { background: var(--secondary); color: white; }
        .btn-admin-login { background: #34495e; color: white; }

        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin: 30px 0; }
        .stat-card { background: var(--primary); color: white; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-card span { display: block; font-size: 2rem; font-weight: bold; }

        /* Form and Table */
        form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f9f9f9; padding: 20px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 30px; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; color: #555; }
        input, select { padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .btn-add { grid-column: 1 / -1; background: var(--secondary); color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: var(--primary); color: white; }
        tr:nth-child(even) { background-color: #f8f9fa; }
        
        .btn-delete { background: var(--danger); color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <h2>Welcome</h2>
        <p>Please select your access level:</p>
        <button class="btn-guest" onclick="accessAsGuest()">Register (Guest)</button>
        <button class="btn-admin-login" onclick="accessAsAdmin()">Admin Login</button>
        <p style="font-size: 0.8rem; color: #888; margin-top: 15px;">Municipality of Don Carlos</p>
    </div>
</div>

<div class="container">
    <div style="text-align: right;">
        <button onclick="location.reload()" style="background:none; border:1px solid #ccc; cursor:pointer; padding:5px 10px; border-radius:4px;">Logout/Exit</button>
    </div>
    <h1>Municipality of Don Carlos</h1>
    <h2>Youth Profiling System</h2>

    <div id="adminStats" class="stats-grid hidden">
        <div class="stat-card">Total Youth <span id="stat-total">0</span></div>
        <div class="stat-card">In-School <span id="stat-isy">0</span></div>
        <div class="stat-card">Out-of-School <span id="stat-osy">0</span></div>
        <div class="stat-card">Working <span id="stat-working">0</span></div>
        <div class="stat-card">IP Youth <span id="stat-ip">0</span></div>
    </div>

    <form id="youthForm">
        <div class="form-group"><label>Full Name</label><input type="text" id="name" required></div>
        <div class="form-group"><label>Age</label><input type="number" id="age" min="15" max="30" required></div>
        <div class="form-group">
            <label>Gender</label>
            <select id="gender"><option value="Male">Male</option><option value="Female">Female</option></select>
        </div>
        <div class="form-group">
            <label>Education Status</label>
            <select id="edu"><option value="ISY">In-School Youth</option><option value="OSY">
