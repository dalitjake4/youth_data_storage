<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Carlos Youth Information System</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #27ae60; --light: #ecf0f1; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--light); margin: 20px; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: var(--primary); text-align: center; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-bottom: 30px; }
        .stat-card { background: var(--primary); color: white; padding: 15px; border-radius: 5px; text-align: center; }
        .stat-card span { display: block; font-size: 1.5rem; font-weight: bold; }

        /* Form Styling */
        form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #f9f9f9; padding: 20px; border-radius: 5px; margin-bottom: 30px; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        button { grid-column: 1 / -1; padding: 10px; background: var(--secondary); color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 1rem; }
        button:hover { background: #219150; }

        /* Table Styling */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: var(--primary); color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }
    </style>
</head>
<body>

<div class="container">
    <h1>Municipality of Don Carlos</h1>
    <h2>Youth Profiling System</h2>

    <div class="stats-grid">
        <div class="stat-card">Total Youth <span id="stat-total">0</span></div>
        <div class="stat-card">In-School <span id="stat-isy">0</span></div>
        <div class="stat-card">Out-of-School <span id="stat-osy">0</span></div>
        <div class="stat-card">Working <span id="stat-working">0</span></div>
        <div class="stat-card">IP Youth <span id="stat-ip">0</span></div>
    </div>

    <form id="youthForm">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="name" required>
        </div>
        <div class="form-group">
            <label>Age</label>
            <input type="number" id="age" min="15" max="30" required>
        </div>
        <div class="form-group">
            <label>Gender</label>
            <select id="gender">
                <option value="Male">Male</option>
                <option value="Female">Female</option>
            </select>
        </div>
        <div class="form-group">
            <label>Education Status</label>
            <select id="edu">
                <option value="ISY">In-School Youth</option>
                <option value="OSY">Out-of-School Youth</option>
            </select>
        </div>
        <div class="form-group">
            <label>Special Sectors</label>
            <select id="special">
                <option value="None">None</option>
                <option value="PWD">Youth with Disability</option>
                <option value="IP">IP Youth</option>
                <option value="Both">Both IP & PWD</option>
            </select>
        </div>
        <div class="form-group">
            <label>Employment</label>
            <select id="job">
                <option value="Unemployed">Unemployed</option>
                <option value="Working">Working Youth</option>
            </select>
        </div>
        <button type="submit">Add to Registry</button>
    </form>

    <table id="youthTable">
        <thead>
    <tr>
        <th>Name</th>
         <th>Age Group</th>
          <th>Gender</th>
           <th>Status (ISY/OSY)</th>
            <th>PWD Status</th>
           <th>IP Youth</th>
          <th>Employment</th>
         <th>Actions</th> </tr>
        </thead> 
        <tbody>
            </tbody>
    </table>
</div>

<script>
    // --- CONFIGURATION ---
const GITHUB_USER = 'dalitjake4';
const REPO_NAME = 'youth_data_storage';
const FILE_PATH = 'data.json';
// You will be prompted for your token to keep it out of the source code
const AUTH_TOKEN = prompt("Please enter your GitHub Personal Access Token to sync data:");

let youthData = [];
let fileSha = ""; // Required by GitHub to update existing files

// 1. LOAD DATA FROM GITHUB ON START
async function loadData() {
    try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}`, {
            headers: { 'Authorization': `token ${AUTH_TOKEN}` }
        });
        const data = await response.json();
        fileSha = data.sha; // Save the SHA for later updates
        
        // Decode Base64 content from GitHub
        const content = atob(data.content);
        youthData = JSON.parse(content);
        
        updateTable();
        updateStats();
    } catch (err) {
        console.error("Error loading data:", err);
        alert("Failed to load data from GitHub. Check your Token/Repo settings.");
    }
}

// 2. SAVE DATA TO GITHUB
async function saveToGitHub() {
    const content = btoa(JSON.stringify(youthData, null, 2)); // Encode to Base64
    
    try {
        const response = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}`, {
            method: 'PUT',
            headers: {
                'Authorization': `token ${AUTH_TOKEN}`,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                message: "Update youth registry",
                content: content,
                sha: fileSha // Tells GitHub which version we are overwriting
            })
        });
        
        const result = await response.json();
        fileSha = result.content.sha; // Update SHA for next save
        alert("Data synced to GitHub successfully!");
    } catch (err) {
        console.error("Error saving data:", err);
        alert("Failed to sync data.");
    }
}

// 3. FORM SUBMISSION
document.getElementById('youthForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const youth = {
        name: document.getElementById('name').value,
        ageGroup: parseInt(document.getElementById('age').value) <= 20 ? "15-20" : (parseInt(document.getElementById('age').value) <= 25 ? "21-25" : "26-30"),
        gender: document.getElementById('gender').value,
        edu: document.getElementById('edu').value,
        job: document.getElementById('job').value,
        isPWD: (document.getElementById('special').value === 'PWD' || document.getElementById('special').value === 'Both') ? 'Yes' : 'No',
        isIP: (document.getElementById('special').value === 'IP' || document.getElementById('special').value === 'Both') ? 'Yes' : 'No'
    };

    youthData.push(youth);
    
    // Update UI
    updateTable();
    updateStats();
    
    // Save to GitHub
    await saveToGitHub();
    
    this.reset();
});

// Helper UI functions
// Updated Table UI to include a Delete Button
function updateTable() {
    const tbody = document.querySelector('#youthTable tbody');
    tbody.innerHTML = youthData.map((y, index) => `
        <tr>
            <td>${y.name}</td>
            <td>${y.ageGroup}</td>
            <td>${y.gender}</td>
            <td>${y.edu}</td>
            <td>${y.isPWD}</td>
            <td>${y.isIP}</td>
            <td>${y.job}</td>
            <td>
                <button onclick="deleteYouth(${index})" 
                    style="background:#e74c3c; padding: 5px 10px; font-size: 0.75rem; width: auto;">
                    Delete
                </button>
            </td>
        </tr>`).join('');
}

// 4. DELETE FUNCTION
async function deleteYouth(index) {
    if (confirm(`Are you sure you want to delete ${youthData[index].name}?`)) {
        // Remove from local array
        youthData.splice(index, 1);
        
        // Refresh UI
        updateTable();
        updateStats();
        
        // Sync the deletion to GitHub
        await saveToGitHub();
    }

}

function updateStats() {
    document.getElementById('stat-total').innerText = youthData.length;
    document.getElementById('stat-isy').innerText = youthData.filter(y => y.edu === 'ISY').length;
    document.getElementById('stat-osy').innerText = youthData.filter(y => y.edu === 'OSY').length;
    document.getElementById('stat-working').innerText = youthData.filter(y => y.job === 'Working').length;
    document.getElementById('stat-ip').innerText = youthData.filter(y => y.isIP === 'Yes').length;
}

// Initial Load
if(AUTH_TOKEN) loadData();
    
</script>

</body>
</html>
