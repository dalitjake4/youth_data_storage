<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Don Carlos Youth System</title>
    <style>
        :root {
            --primary: #2563eb; /* Modern Blue */
            --secondary: #10b981; /* Emerald Green */
            --danger: #ef4444; /* Rose Red */
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }

        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            background: var(--bg); 
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container { 
            max-width: 1000px; 
            margin: auto; 
        }

        /* --- LOGIN OVERLAY --- */
        #loginOverlay {
            position: fixed; inset: 0;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999;
        }

        .login-box { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 16px; 
            width: 350px; 
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .login-box h2 { margin-bottom: 10px; color: var(--text); }
        
        .login-box button { 
            width: 100%; padding: 14px; margin: 10px 0; 
            border: none; border-radius: 8px; 
            cursor: pointer; font-weight: 600; 
            transition: transform 0.2s, background 0.2s;
        }

        .btn-guest { background: var(--secondary); color: white; }
        .btn-admin { background: var(--primary); color: white; }
        .login-box button:hover { transform: translateY(-2px); opacity: 0.9; }

        /* --- DASHBOARD ELEMENTS --- */
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-size: 2.2rem; color: var(--primary); margin-bottom: 5px; }
        .header p { color: #64748b; font-size: 1.1rem; }

        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px; 
        }

        .stat-card { 
            background: var(--card); 
            padding: 24px; 
            border-radius: 12px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            border-bottom: 4px solid var(--primary);
        }

        .stat-card small { color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
        .stat-card span { display: block; font-size: 2.5rem; font-weight: 800; color: var(--text); }

        /* --- FORM STYLING --- */
        .card-form { 
            background: var(--card); 
            padding: 30px; 
            border-radius: 12px; 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        .form-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
        }

        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: #475569; }
        
        input, select { 
            padding: 12px; 
            border: 1px solid #e2e8f0; 
            border-radius: 8px; 
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--primary); }

        .btn-submit { 
            grid-column: 1 / -1; 
            background: var(--primary); 
            color: white; 
            padding: 14px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 700; 
            cursor: pointer;
            margin-top: 10px;
        }

        /* --- TABLE STYLING --- */
        .table-container { 
            background: var(--card); 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); 
        }

        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f5f9; padding: 16px; font-size: 0.85rem; color: #64748b; text-transform: uppercase; }
        td { padding: 16px; border-top: 1px solid #f1f5f9; }
        
        .badge { 
            padding: 4px 10px; 
            border-radius: 20px; 
            font-size: 0.75rem; 
            font-weight: 600; 
        }
        .badge-isy { background: #dcfce7; color: #166534; }
        .badge-osy { background: #fee2e2; color: #991b1b; }

        .btn-del { 
            background: #fff1f2; color: var(--danger); 
            border: 1px solid #fecdd3; padding: 6px 12px; 
            border-radius: 6px; cursor: pointer; 
        }

        .hidden { display: none !important; }

        @media (max-width: 600px) {
            .container { padding: 10px; }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div id="loginOverlay">
    <div class="login-box">
        <div style="font-size: 3rem; margin-bottom: 10px;">🇵🇭</div>
        <h2>Youth Registry</h2>
        <p style="color: #64748b; margin-bottom: 20px;">Municipality of Don Carlos</p>
        <button class="btn-guest" onclick="accessAsGuest()">Member Registration</button>
        <button class="btn-admin" onclick="accessAsAdmin()">Admin Login</button>
    </div>
</div>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <span id="roleTag" style="font-weight: 700; color: var(--primary);"></span>
        <button onclick="location.reload()" style="background:none; border:none; color: var(--danger); cursor:pointer; font-weight:600;">Log Out</button>
    </div>

    <div class="header">
        <h1>Municipality of Don Carlos</h1>
        <p>Official Youth Profiling & Information System</p>
    </div>

    <div id="adminStats" class="stats-grid hidden">
        <div class="stat-card"><small>Total Registered</small><span id="stat-total">0</span></div>
        <div class="stat-card"><small>In-School</small><span id="stat-isy">0</span></div>
        <div class="stat-card"><small>Out-of-School</small><span id="stat-osy">0</span></div>
        <div class="stat-card"><small>Employment Rate</small><span id="stat-work">0%</span></div>
    </div>

    <div class="card-form">
        <h3 style="margin-top:0">Registration Form</h3>
        <form id="youthForm">
            <div class="form-grid">
                <div class="form-group"><label>Full Name</label><input type="text" id="name" placeholder="Juan Dela Cruz" required></div>
                <div class="form-group"><label>Age</label><input type="number" id="age" min="15" max="30" required></div>
                <div class="form-group"><label>Gender</label><select id="gender"><option>Male</option><option>Female</option></select></div>
                <div class="form-group"><label>Education Status</label><select id="edu"><option value="ISY">In-School</option><option value="OSY">Out-of-School</option></select></div>
                <div class="form-group"><label>Special Sector</label><select id="special"><option>None</option><option>PWD</option><option>IP Youth</option></select></div>
                <div class="form-group"><label>Job Status</label><select id="job"><option value="Unemployed">Unemployed</option><option value="Working">Working</option></select></div>
            </div>
            <button type="submit" class="btn-submit">Register Now</button>
        </form>
    </div>

    <div id="adminTable" class="table-container hidden">
        <table>
            <thead>
                <tr>
                    <th>Name</th><th>Age</th><th>Status</th><th>Sector</th><th>Job</th><th>Action</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
// --- LOGIC ---
const GITHUB_USER = 'dalitjake4';
const REPO_NAME = 'youth_data_storage';
const FILE_PATH = 'data.json';
let AUTH_TOKEN = ""; 
let youthData = [];
let fileSha = ""; 
let userRole = "";

function accessAsGuest() {
    userRole = 'guest';
    AUTH_TOKEN = prompt("Enter Access Key:");
    if(AUTH_TOKEN) {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('roleTag').innerText = "PUBLIC ACCESS";
        loadData();
    }
}

function accessAsAdmin() {
    const pass = prompt("Admin Password:");
    if(pass === "1234") {
        userRole = 'admin';
        AUTH_TOKEN = prompt("Enter GitHub Token:");
        if(AUTH_TOKEN) {
            document.getElementById('loginOverlay').style.display = 'none';
            document.getElementById('adminStats').classList.remove('hidden');
            document.getElementById('adminTable').classList.remove('hidden');
            document.getElementById('roleTag').innerText = "ADMINISTRATOR";
            loadData();
        }
    }
}

async function loadData() {
    try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}`, {
            headers: { 'Authorization': `token ${AUTH_TOKEN}` }
        });
        const data = await res.json();
        fileSha = data.sha;
        youthData = JSON.parse(atob(data.content));
        updateUI();
    } catch (e) { alert("Error loading data."); }
}

async function saveData() {
    const content = btoa(JSON.stringify(youthData, null, 2));
    try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${REPO_NAME}/contents/${FILE_PATH}`, {
            method: 'PUT',
            headers: { 'Authorization': `token ${AUTH_TOKEN}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: "Sync Data", content: content, sha: fileSha })
        });
        const result = await res.json();
        fileSha = result.content.sha;
    } catch (e) { console.error(e); }
}

document.getElementById('youthForm').onsubmit = async (e) => {
    e.preventDefault();
    const youth = {
        name: document.getElementById('name').value,
        age: document.getElementById('age').value,
        gender: document.getElementById('gender').value,
        edu: document.getElementById('edu').value,
        special: document.getElementById('special').value,
        job: document.getElementById('job').value
    };
    youthData.push(youth);
    updateUI();
    await saveData();
    alert("Record Saved Successfully!");
    if(userRole === 'guest') location.reload();
};

function updateUI() {
    if(userRole !== 'admin') return;

    // Stats Logic
    document.getElementById('stat-total').innerText = youthData.length;
    document.getElementById('stat-isy').innerText = youthData.filter(y => y.edu === 'ISY').length;
    document.getElementById('stat-osy').innerText = youthData.filter(y => y.edu === 'OSY').length;
    const workCount = youthData.filter(y => y.job === 'Working').length;
    const rate = youthData.length ? Math.round((workCount / youthData.length) * 100) : 0;
    document.getElementById('stat-work').innerText = rate + "%";

    // Table Logic
    const tbody = document.getElementById('tableBody');
    tbody.innerHTML = youthData.map((y, i) => `
        <tr>
            <td style="font-weight:600">${y.name}</td>
            <td>${y.age}</td>
            <td><span class="badge ${y.edu === 'ISY' ? 'badge-isy' : 'badge-osy'}">${y.edu}</span></td>
            <td>${y.special}</td>
            <td>${y.job}</td>
            <td><button class="btn-del" onclick="deleteItem(${i})">Delete</button></td>
        </tr>
    `).join('');
}

async function deleteItem(i) {
    if(confirm("Confirm deletion of this record?")) {
        youthData.splice(i, 1);
        updateUI();
        await saveData();
    }
}
</script>
</body>
</html>
